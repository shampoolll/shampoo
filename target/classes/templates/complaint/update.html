<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
>
<head>
    <meta charset="utf-8"/>
    <title>系统后台</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta content="Premium Multipurpose Admin & Dashboard Template" name="description"/>
    <meta content="Themesdesign" name="author"/>
    <link rel="shortcut icon" href="assets/images/favicon.ico">
    <link href="assets/libs/admin-resources/jquery.vectormap/jquery-jvectormap-1.2.2.css" rel="stylesheet"
          type="text/css"/>
    <link href="assets/css/bootstrap.min.css" id="bootstrap-style" rel="stylesheet" type="text/css"/>
    <link href="assets/css/icons.min.css" rel="stylesheet" type="text/css"/>
    <link href="assets/css/app.min.css" id="app-style" rel="stylesheet" type="text/css"/>

    <link rel="stylesheet" type="text/css"  th:href="@{/layui/css/layui.css}">
    <script type="text/javascript" th:src="@{/layui/jquery-3.6.0.js}"></script>
    <script th:src="@{/layui/layui.js}" charset="utf-8"></script>

</head>
<body>
<div id="layout-wrapper">

    <div th:include="home/menu"></div>
    <div class="main-content">
        <div class="page-content">
            <!-- start page title -->
            <div class="page-title-box">
                <div class="container-fluid">
                    <div class="row align-items-center">
                        <div class="col-sm-6">
                            <div class="page-title">
                                <h4>预约看房管理</h4>
                                <ol class="breadcrumb m-0">
                                    <li class="breadcrumb-item"><a href="javascript: void(0);">回复预约看房</a></li>

                                </ol>
                            </div>
                        </div>

                    </div>
                </div>
            </div>
            <!-- end page title -->
            <div class="container-fluid">
                <div class="page-content-wrapper">
                    <div class="row">
                        <div class="col-xl-12">
                            <div class="card">
                                <div class="card-body">
                                    <form class="custom-validation" th:action="@{/updateComplaint}" method="post" >
                                        <input type="hidden" name="id"  th:value="${data.id}" class="layui-input" />



                                        <div class="mb-3">
                                            <label>预约看房说明</label>
                                            <input type="text" name="title" readonly  th:value="${data.title}"  class="form-control" required/>
                                        </div>
                                        <div class="mb-3">
                                            <label>详细内容</label>
                                            <p readonly="" th:utext="${data.detail}">
                                            </p>
                                        </div>


                                        <div class="mb-3">
                                            <label>回复内容</label>
                                            <input type="text" name="result"  class="form-control" required/>
                                        </div>

                                        <div class="mb-0">
                                            <div>
                                                <button type="submit" id="save" class="btn btn-primary waves-effect waves-light me-1">
                                                    提交
                                                </button>
                                                <button type="reset" class="btn btn-secondary waves-effect">
                                                    重置
                                                </button>
                                                <a href="ComplaintList" type="button" class="btn btn-dark waves-effect">
                                                    返回
                                                </a>
                                            </div>
                                        </div>
                                    </form>

                                </div>
                            </div>
                        </div> <!-- end col -->


                    </div> <!-- end row -->

                </div>


            </div> <!-- container-fluid -->
        </div>
        <!-- End Page-content -->



    </div>
    <!-- end main content-->

</div>
<!-- END layout-wrapper -->


<!-- Right bar overlay-->
<div class="rightbar-overlay"></div>



</body>
</html>
