
<!DOCTYPE html>
<html class="no-js" lang="en"xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8">
    <title>房屋租赁管理系统</title>
    <meta http-equiv="x-ua-compatible" content="ie=edge">
    <meta name="description" content="">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- Favicon -->
    <link rel="shortcut icon" type="image/x-icon" href="static/picture/favicon.svg">
    <!-- Template CSS -->
    <link rel="stylesheet" href="static/css/main.css">
</head>

<body>
<!-- Quick view -->
<div th:include="index/header"></div>

<main class="main">
    <br>
    <section class="newsletter wow fadeIn animated mb-15 animated animated" style="visibility: visible;">
        <div class="container">
            <div class="row">
                <div class="col-lg-12">
                    <div class="position-relative newsletter-inner">
                        <div class="newsletter-content">
                            <h2 class="mb-20">欢迎使用，网站公告阅读</h2>
                            <div class="search-form">
                                <form th:action="toBoard">
                                    <input name="title" style="width: 900px" type="text" placeholder="公告标题查询">
                                    <button type="submit"> <i class="fi-rs-search"></i> </button>
                                </form>
                            </div>
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </section>
    <br>
    <div class="page-content mb-50">
        <div class="container">
            <div class="row">
                <div class="col-xl-8 col-lg-10 col-md-12 m-auto">
                    <div class="shop-product-fillter">
                        <div class="totall-product">
                            <p>共<strong class="text-brand" th:text="${pageInfo.total}"></strong> 条公告!</p>
                        </div>
                        <div class="sort-by-product-area">
                            <div class="sort-by-cover mr-10">
                                <div class="sort-by-product-wrap">
                                    <div class="sort-by">
                                        <span><i class="fi-rs-apps"></i>每页:</span>
                                    </div>
                                    <div class="sort-by-dropdown-wrap">
                                        <span th:text="${pageInfo.pageSize}">  <i class="fi-rs-angle-small-down"></i></span>
                                    </div>
                                </div>
                                <div class="sort-by-dropdown">
                                    <ul>
                                        <li><a class="active" th:href="@{/toBoard(pageSize=${pageInfo.pageSize})}" th:text="${pageInfo.pageSize}"></a></li>
                                        <li><a th:href="@{/toBoard(pageSize=5)}">5</a></li>
                                        <li><a th:href="@{/toBoard(pageSize=10)}">10</a></li>
                                        <li><a th:href="@{/toBoard(pageSize=20)}">20</a></li>
                                        <li><a th:href="@{/toBoard(pageSize=30)}">30</a></li>

                                    </ul>
                                </div>
                            </div>

                        </div>
                    </div>
                    <div class="loop-grid loop-big">
                        <div class="row">
                            <article th:each="data:${pageInfo.list}" class="first-post mb-30 wow fadeIn animated hover-up animated animated animated" style="visibility: visible;">
                                <div class="position-relative overflow-hidden">
                                    <span class="top-left-icon"><i class="fi-rs-headphones"></i></span>
                                    <div class="post-thumb border-radius-15">
                                        <a th:href="@{/toBoard_detail(id=${data.id})}">
                                            <img style="width: 1050px;height: 458px" th:src="${data.photo}" class="border-radius-15"  alt="">
                                        </a>
                                    </div>
                                </div>
                                <div class="entry-content">
                                    <p class="post-exerpt font-medium text-muted mb-30" th:text="${data.title}"></p>
                                    <div class="mb-20 entry-meta meta-2">
                                        <div class="entry-meta meta-1 mb-30">
                                            <div class="font-sm">
                                                <span><span class="mr-10 text-muted" th:text="${data.editor}+'发布'"><i class="fi-rs-eye"></i></span></span>
                                                <span class="ml-30"><span class="mr-10 text-muted" th:text="${data.create_time}"><i class="fi-rs-comment-alt"></i></span></span>
                                            </div>
                                        </div>
                                        <a th:href="@{/toBoard_detail(id=${data.id})}" class="btn btn-sm">了解更多<i class="fi-rs-arrow-right ml-10"></i></a>
                                    </div>
                                </div>
                            </article>
                           </div>
                    </div>
                    <div class="pagination-area mt-20 mb-20">
                        <nav aria-label="Page navigation example">
                            <ul class="pagination justify-content-start">
                                <li class="page-item">
                                    <a class="page-link" th:href="'/'+${url}+'?pageNum='+${pageInfo.prePage}"
                                       th:if="${pageInfo.pageNum > pageInfo.getFirstPage() && pageInfo.prePage != 0}"><i class="fi-rs-arrow-small-left"></i></a>
                                </li>


                                <li class="page-item" th:each="i:${pageInfo.navigatepageNums}">

                                    <a style="color: white" class="page-link bg-primary" th:href="'/'+${url}+'?pageNum='+${i}" th:if="${pageInfo.pageNum == i}"
                                       th:text="${i}"
                                    ></a>

                                    <a class="page-link" th:href="'/'+${url}+'?pageNum='+${i}"
                                       th:if="${pageInfo.pageNum != i}" th:text="${i}">
                                    </a>
                                </li>

                                <li class="page-item"><a class="page-link" th:href="'/'+${url}+'?pageNum='+${pageInfo.nextPage}"
                                                         th:if="${pageInfo.pageNum < pageInfo.getLastPage()}"><i class="fi-rs-arrow-small-right"></i></a></li>
                            </ul>
                        </nav>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<div th:include="index/footer"></div>
<!-- Preloader Start -->
<div id="preloader-active">
    <div class="preloader d-flex align-items-center justify-content-center">
        <div class="preloader-inner position-relative">
            <div class="text-center">
                <img src="static/picture/loading.gif" alt="">
            </div>
        </div>
    </div>
</div>
<!-- Vendor JS-->
<script src="static/js/modernizr-3.6.0.min.js"></script>
<script src="static/js/jquery-3.6.0.min.js"></script>
<script src="static/js/jquery-migrate-3.3.0.min.js"></script>
<script src="static/js/bootstrap.bundle.min.js"></script>
<script src="static/js/slick.js"></script>
<script src="static/js/jquery.syotimer.min.js"></script>
<script src="static/js/wow.js"></script>
<script src="static/js/jquery-ui.js"></script>
<script src="static/js/perfect-scrollbar.js"></script>
<script src="static/js/magnific-popup.js"></script>
<script src="static/js/select2.min.js"></script>
<script src="static/js/waypoints.js"></script>
<script src="static/js/counterup.js"></script>
<script src="static/js/jquery.countdown.min.js"></script>
<script src="static/js/images-loaded.js"></script>
<script src="static/js/isotope.js"></script>
<script src="static/js/scrollup.js"></script>
<script src="static/js/jquery.vticker-min.js"></script>
<script src="static/js/jquery.theia.sticky.js"></script>
<script src="static/js/jquery.elevatezoom.js"></script>
<!-- Template  JS -->
<script src="static/js/main.js"></script>
<script src="static/js/shop.js"></script>

</body>

</html>
