
<!DOCTYPE html>
<html class="no-js" lang="en"xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8">
    <title>房屋租赁管理系统</title>
    <meta http-equiv="x-ua-compatible" content="ie=edge">
    <meta name="description" content="">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- Favicon -->
    <link rel="shortcut icon" type="image/x-icon" href="static/picture/favicon.svg">
    <!-- Template CSS -->
    <link rel="stylesheet" href="static/css/main.css">
    <style>
        .headthread{
            background-color: #ececec;font-family: Quicksand,sans-serif;color: #253D4E;ont-size:17px; font-weight: 700;}
    </style>


</head>

<body>
<!-- Quick view -->
<div th:include="index/header"></div>
<main class="main">

    <div class="container mb-80 mt-50">
        <div class="row">
            <div class="col-lg-8 mb-40">
                <h1 class="heading-2 mb-10">租赁确认</h1>

            </div>
        </div>
        <div class="row">
            <div class="col-lg-7">

                <div class="row">
                    <h4 class="mb-30">订单详情</h4>
                    <form method="post" th:action="addOrders">
                        <div class="row">
                            <div class="form-group col-lg-6">
                                <input type="text" required="" th:value="${session.get('realname')}" name="username" id="username"  placeholder="收件人">
                            </div>
                            <div class="form-group col-lg-6">
                                <input type="text" required="" th:value="${session.get('user').phone}" name="phone" id="phone" placeholder="手机号">
                            </div>
                        </div>

                        <div class="row shipping_calculator">
                            <div class="form-group col-lg-12">
                                <div class="custom_select">
                                    <select class="form-control select-active" required="required" name="total" id="total">
                                        <option value="3">3个月</option>
                                        <option value="6">6个月</option>
                                        <option value="12">一年</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                        <div class="form-group mb-30">
                            <textarea rows="5" placeholder="备注信息" name="content"></textarea>
                        </div>
                     <button  type="submit"  class="btn btn-fill-out btn-block mt-30">确认租赁<i class="fi-rs-sign-out ml-15"></i></button>

                </div>
            </div>
            <div class="col-lg-5">
                <div class="border p-40 cart-totals ml-30 mb-50">
                    <div class="d-flex align-items-end justify-content-between mb-30">
                        <h4>您的订单</h4>
<!--
                        <h6 style="color: palevioletred"  th:text="${'月租金￥'+total}"></h6>
-->
                        <input type="hidden" name="money" th:value="${total}">

                    </div>
                    <div class="divider-2 mb-30"></div>
                    <div class="table-responsive order_table checkout">
                        <table class="table no-border">
                            <tbody>
                            <tr th:each="data:${cartList}">
                                <input type="hidden" name="goodslist" th:value="${data.id }">
                                <td class="image product-thumbnail"><img th:src="${data.goods.photo}" alt="#"></td>
                                <td>
                                    <h6 class="w-160 mb-5"><a th:text="${data.goods.names}" class="text-heading"></a></h6>

                                </td>
                              <!--  <td>
                                    <h6 class="text-muted pl-20 pr-20" th:text="${data.nums}">1</h6>
                                </td>-->
                                <td>
                                    <h4 class="text-brand" th:text="'月租金￥'+${data.goods.price}"></h4>
                                </td>
                            </tr>

                            </tbody>
                        </table>
                    </div>
                </div>
            </form>
            </div>
        </div>
    </div>


</main>

</div>
<div th:include="index/footer"></div>
<!-- Preloader Start -->
<div id="preloader-active">
    <div class="preloader d-flex align-items-center justify-content-center">
        <div class="preloader-inner position-relative">
            <div class="text-center">
                <img src="static/picture/loading.gif" alt="">
            </div>
        </div>
    </div>
</div>
<!-- Vendor JS-->

<!-- Vendor JS-->
<script src="static/js/modernizr-3.6.0.min.js"></script>
<script src="static/js/jquery-3.6.0.min.js"></script>
<script src="static/js/jquery-migrate-3.3.0.min.js"></script>
<script src="static/js/bootstrap.bundle.min.js"></script>
<script src="static/js/slick.js"></script>
<script src="static/js/jquery.syotimer.min.js"></script>
<script src="static/js/wow.js"></script>
<script src="static/js/jquery-ui.js"></script>
<script src="static/js/perfect-scrollbar.js"></script>
<script src="static/js/magnific-popup.js"></script>
<script src="static/js/select2.min.js"></script>
<script src="static/js/waypoints.js"></script>
<script src="static/js/counterup.js"></script>
<script src="static/js/jquery.countdown.min.js"></script>
<script src="static/js/images-loaded.js"></script>
<script src="static/js/isotope.js"></script>
<script src="static/js/scrollup.js"></script>
<script src="static/js/jquery.vticker-min.js"></script>
<script src="static/js/jquery.theia.sticky.js"></script>
<script src="static/js/jquery.elevatezoom.js"></script>
<!-- Template  JS -->
<script src="static/js/main.js"></script>
<script src="static/js/shop.js"></script>

<link href="assets/libs/sweetalert2/sweetalert2.min.css" rel="stylesheet" type="text/css" />
<script th:src="@{/assets/libs/sweetalert2/sweetalert2.min.js}" src=""></script>
<script th:src="@{/assets/js/pages/sweet-alerts.init.js}" src=""></script>


</body>

</html>
