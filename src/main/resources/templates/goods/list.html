<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <title>系统后台</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta content="Premium Multipurpose Admin & Dashboard Template" name="description"/>
    <meta content="Themesdesign" name="author"/>
    <!-- App favicon -->
    <link rel="shortcut icon" href="assets/images/favicon.ico">

    <!-- Bootstrap Css -->
    <link href="assets/css/bootstrap.min.css" id="bootstrap-style" rel="stylesheet" type="text/css"/>
    <!-- Icons Css -->
    <link href="assets/css/icons.min.css" rel="stylesheet" type="text/css"/>
    <!-- App Css-->
    <link href="assets/css/app.min.css" id="app-style" rel="stylesheet" type="text/css"/>


    <!-- DataTables -->
    <link href="assets/libs/datatables.net-bs4/css/dataTables.bootstrap4.min.css" rel="stylesheet" type="text/css"/>
    <link href="assets/libs/datatables.net-buttons-bs4/css/buttons.bootstrap4.min.css" rel="stylesheet"
          type="text/css"/>


</head>
<body>

<!-- Begin page -->
<div id="layout-wrapper">
    <div th:include="home/menu"></div>

    <div class="main-content">

        <div class="page-content">

            <!-- start page title -->
            <div class="page-title-box">
                <div class="container-fluid">
                    <div class="row align-items-center">
                        <div class="col-sm-6">
                            <div class="page-title">
                                <h4>房屋管理</h4>
                                <ol class="breadcrumb m-0">
                                    <li class="breadcrumb-item"><a href="javascript: void(0);">&nbsp;</a></li>

                                </ol>
                            </div>
                        </div>
                        <div class="col-sm-6" th:if="${session.get('type') == '3'}">
                            <div class="float-end d-none d-sm-block">
                                <a href="toAddGoods" class="btn btn-success">添加房屋</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- end page title -->


            <div class="container-fluid">
                <div class="page-content-wrapper">
                    <div class="row">
                        <div class="col-12">
                            <div class="card">
                                <div class="card-body">
                                    <h4 class="header-title">房屋列表</h4>
                                    <p class="card-title-desc">&nbsp;
                                    </p>
                                    <table id="datatable-buttons" class="table table-striped table-bordered dt-responsive nowrap" style="border-collapse: collapse; border-spacing: 0; width: 100%;">
                                        <thead>
                                        <tr>
                                            <th>id</th>
                                            <th>名称</th>
                                            <th>房东</th>
                                            <th>照片</th>
                                            <th>房屋类型</th>
                                            <th>详细地址</th>
                                            <th>平台租金</th>
                                            <th>线下租金</th>
                                            <th>录入时间</th>
                                            <th>是否热门</th>
                                            <th>租赁状态</th>
                                            <th>浏览量</th>
                                            <th>操作</th>
                                        </tr>
                                        </thead>

                                        <tbody>
                                     <tr th:each="data:${list}">

                                         <td th:text="${data.id}"></td>

                                         <td th:text="${data.names}"></td>
                                         <td th:text="${data.bussiness.name}"></td>
                                         <td>
                                             <img th:src="${data.photo}" alt="" class="avatar-sm">
                                         </td>
                                         <td th:text="${data.category.name}"></td>
                                         <td th:text="${data.provinces.province_Name}+${data.cities.city_Name}+${data.areas.area_Name}+${data.address}"></td>
                                         <td th:text="${data.price}+'元'"> </td>
                                         <td th:text="${data.normalprice}+'元'"> </td>
                                         <td th:text="${data.createtime}"> </td>
                                         <td>
                                             <div th:if="${data.ishot==1}" th:text="热门" class="badge badge-soft-danger font-size-12"></div>

                                          <div th:if="${data.ishot==0}" th:text="正常" class="badge badge-soft-success font-size-12"></div>
                                         </td>
                                         <td>
                                             <div th:if="${data.state==1}" th:text="租赁中" class="badge badge-soft-warning font-size-12"></div>

                                             <div th:if="${data.state==0}" th:text="未租赁" class="badge badge-soft-info font-size-12"></div>
                                         </td>
                                         <td th:text="${data.seenums}"> </td>
                                         <td>
                                             <a type="button" th:href="@{/toUpdateGoods(id=${data.id})}" class="btn btn-primary waves-effect waves-light">修改</a>
                                             <button type="button" th:onclick="del([[${data.id}]])" class="btn btn-danger waves-effect waves-light">删除</button>
                                                 <button th:if="${data.ishot==0}"  th:onclick="hot([[${data.id}]],[[1]])"  type="button" class="btn btn-success waves-effect waves-light" >
                                                     设置热门
                                                 </button>
                                                 <button th:if="${data.ishot==1}"th:onclick="hot([[${data.id}]],[[0]])" type="button" class="btn btn-info waves-effect waves-light" >
                                                     取消热门
                                                 </button>

                                             <button th:if="${data.state==1}"th:onclick="end([[${data.id}]],[[0]])" type="button" class="btn btn-secondary waves-effect waves-light" >
                                                 结束租房
                                             </button>
                                         </td>
                                        </tr>
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div> <!-- end col -->
                    </div> <!-- end row -->

                </div>


            </div> <!-- container-fluid -->
        </div>
        <!-- End Page-content -->


    </div>

</div>

<!--列表页面的-->
<!-- Required datatable js -->
<script th:src="@{/assets/libs/jquery/jquery.min.js}" charset="utf-8"></script>

<script th:src="@{/assets/libs/datatables.net/js/jquery.dataTables.min.js}" charset="utf-8"></script>
<script th:src="@{/assets/libs/datatables.net-bs4/js/dataTables.bootstrap4.min.js}" charset="utf-8"></script>
<!-- Buttons examples -->
<script th:src="@{/assets/libs/datatables.net-buttons/js/dataTables.buttons.min.js}" charset="utf-8"></script>
<script th:src="@{/assets/libs/datatables.net-buttons-bs4/js/buttons.bootstrap4.min.js}" charset="utf-8"></script>
<script th:src="@{/assets/libs/jszip/jszip.min.js}" charset="utf-8"></script>
<script th:src="@{/assets/libs/pdfmake/build/pdfmake.min.js}" charset="utf-8"></script>
<script th:src="@{/assets/libs/pdfmake/build/vfs_fonts.js}" charset="utf-8"></script>
<script th:src="@{/assets/libs/datatables.net-buttons/js/buttons.html5.min.js}" charset="utf-8"></script>
<script th:src="@{/assets/libs/datatables.net-buttons/js/buttons.print.min.js}" charset="utf-8"></script>
<script th:src="@{/assets/libs/datatables.net-buttons/js/buttons.colVis.min.js}" charset="utf-8"></script>
<!-- Responsive examples -->
<!-- Datatable init js -->
<script th:src="@{/assets/js/pages/datatables.init.js}" charset="utf-8"></script>
<link href="assets/libs/sweetalert2/sweetalert2.min.css" rel="stylesheet" type="text/css" />

<script th:src="@{/assets/libs/sweetalert2/sweetalert2.min.js}" src=""></script>
<script th:src="@{/assets/js/pages/sweet-alerts.init.js}" src=""></script>



<script>
    function end(id,state) {
        Swal.fire({
            title: "确定执行吗?",
            text: "操作将无法撤回!",
            icon: "info",
            showCancelButton: !0,
            confirmButtonColor: "#1cbb8c",
            cancelButtonColor: "#f14e4e",
            confirmButtonText: '确认',
            cancelButtonText: '取消'
        }).then((result) => {
            if (result.value) {
                $.ajax({
                    cache: true,
                    url: "setHot",
                    data: {"id": id,"state":state},
                    type: "post",
                    async: false,
                    success: function (data) {
                        console.log(data);
                        if (data == 'yes') {
                            result.value && Swal.fire("完成!", "操作成功", "success", ).then(function () {

                                document.location.reload()

                            })

                        } else {
                            alert("异常！");
                        }
                    }
                });
            }
        })
    }


    function hot(id,ishot) {
        Swal.fire({
            title: "确定执行吗?",
            text: "操作将无法撤回!",
            icon: "info",
            showCancelButton: !0,
            confirmButtonColor: "#1cbb8c",
            cancelButtonColor: "#f14e4e",
            confirmButtonText: '确认',
            cancelButtonText: '取消'
        }).then((result) => {
            if (result.value) {
                $.ajax({
                    cache: true,
                    url: "setHot",
                    data: {"id": id,"ishot":ishot},
                    type: "post",
                    async: false,
                    success: function (data) {
                        console.log(data);
                        if (data == 'yes') {
                            result.value && Swal.fire("完成!", "操作成功", "success", ).then(function () {

                                document.location.reload()

                            })

                        } else {
                            alert("异常！");
                        }
                    }
                });
            }
        })
    }



    function  del(id) {
        if(confirm("确定删除吗?")){
            $.ajax({
                cache:true,
                url:"deleteGoods",
                data:{"id": id},
                type:"post",
                async:false,
                success:function (data) {
                    console.log(data)
                    if (data == 'yes') {
                        document.location.reload();//当前页面
                    }else{
                        alert("删除失败！");
                    }
                }
            });
        }
    }

</script>
</body>
</html>
